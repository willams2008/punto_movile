<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Móvil - Acceso Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4f46e5 0%, transparent 70%);
            filter: blur(50px);
            opacity: 0.4;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-text {
            animation: pulse-text 2s infinite ease-in-out;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>
    
    <div class="glass p-12 text-center max-w-sm w-full mx-4 shadow-2xl relative overflow-hidden" id="main-container">
        <!-- Logo / Icon -->
        <div class="w-24 h-24 bg-indigo-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg shadow-indigo-500/50">
            <i class="fas fa-mobile-screen-button text-4xl"></i>
        </div>

        <h1 class="text-3xl font-black mb-2 tracking-tight">PUNTO MÓVIL</h1>
        <p class="text-indigo-300 text-xs font-bold uppercase tracking-[0.2em] mb-8 pulse-text">Conectando con tu Caja...</p>

        <!-- Status -->
        <div id="status-area" class="space-y-4">
            <span class="loader"></span>
            <p id="status-text" class="text-slate-400 text-sm font-medium italic">Sincronizando enlace seguro...</p>
        </div>

        <div id="error-area" class="hidden space-y-4">
            <div class="w-12 h-12 bg-rose-500/20 text-rose-500 rounded-full mx-auto flex items-center justify-center">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <p class="text-slate-200 text-sm font-bold">No se detecta la caja encendida</p>
            <button onclick="window.location.reload()" class="bg-white text-slate-900 px-6 py-2 rounded-full font-bold text-xs uppercase hover:bg-indigo-50 transition-all">Reintentar</button>
        </div>
    </div>

    <script>
        const TOPIC = 'cajafresh_pos_v2_778899_remote';
        const PING_INTERVAL = 4000;
        let attemptCount = 0;
        let isRedirecting = false;

        async function findCaja() {
            if (isRedirecting) return;

            try {
                console.log(`Buscando señal en: ${TOPIC} (Intento ${attemptCount + 1})`);
                
                const response = await fetch(`https://ntfy.sh/${TOPIC}/raw?poll=1`);
                const text = await response.text();

                if (text && text.trim().length > 0) {
                    const lines = text.trim().split('\n');
                    let foundUrl = null;
                    
                    for (let i = lines.length - 1; i >= 0; i--) {
                        const line = lines[i].trim();
                        const match = line.match(/(https?:\/\/[^\s,]+)/);
                        if (match) {
                            const url = match[1];
                            if (!url.includes('192.168.') && !url.includes('127.0.0.1')) {
                                foundUrl = url;
                                break;
                            }
                            if (!foundUrl) foundUrl = url;
                        }
                    }

                    if (foundUrl) {
                        isRedirecting = true;
                        document.getElementById('status-text').innerHTML = "<b>✅ ¡CAJA ENCONTRADA!</b><br>Conectando al sistema...";
                        document.getElementById('status-text').classList.add('text-emerald-400');
                        document.querySelector('.loader').style.borderColor = '#10b981';
                        
                        setTimeout(() => {
                            const finalUrl = foundUrl.endsWith('/mobile') ? foundUrl : foundUrl.replace(/\/$/, '') + '/mobile';
                            window.location.href = finalUrl;
                        }, 800);
                        return;
                    }
                }

                attemptCount++;
                if (attemptCount >= 10) showError();
                setTimeout(findCaja, PING_INTERVAL);

            } catch (error) {
                console.error("Error buscando caja:", error);
                setTimeout(findCaja, PING_INTERVAL);
            }
        }

        function showError() {
            document.getElementById('status-area').classList.add('opacity-40');
            document.getElementById('error-area').classList.remove('hidden');
            document.getElementById('status-text').textContent = "Buscando señal... la caja parece estar apagada.";
        }

        window.addEventListener('load', () => {
            setTimeout(findCaja, 1500);
        });
    </script>
</body>
</html>
